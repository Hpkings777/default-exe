name: Render Video (Lambda)

on:
  workflow_dispatch:
    inputs:
      composition_id:
        description: 'Remotion Composition ID'
        required: false
        default: 'DEFAULT_EXE'
        type: choice
        options:
          - DEFAULT_EXE
  push:
    branches:
      - master

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Remotion Lambda
        run: |
          npx remotion lambda sites deploy ./src --yes

      - name: Get site ID
        id: site
        run: |
          SITE_ID=$(npx remotion lambda sites list --yes | grep -oP '(?<=siteId: ).*' | head -1)
          echo "site_id=$SITE_ID" >> $GITHUB_OUTPUT

      - name: Render video
        run: |
          npx remotion lambda render "${{ github.event.inputs.composition_id || 'DEFAULT_EXE' }}" \
            --site=${{ steps.site.outputs.site_id }} \
            --output=/tmp/video.mp4 \
            --log=error

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: default-exe-video-${{ github.run_number }}
          path: /tmp/video.mp4
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: /tmp/video.mp4
          name: Render ${{ github.run_number }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Lambda site
        if: always()
        run: |
          npx remotion lambda sites delete ${{ steps.site.outputs.site_id }} --yes || true
