name: Render Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Render video
        run: npx remotion render src/index.tsx DEFAULT_EXE out.mp4 --序列=0 --every-nth-frame=1

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: default-exe-video
          path: out.mp4
          retention-days: 30
