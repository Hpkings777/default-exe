name: Render Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg libnss3 libatk-bridge2.0-0 libcups2 libdbus-1-3 libdrm2 libgbm1 libasound2t64
          npm install --no-package-lock

      - name: Render video
        run: npx remotion render src/index.tsx DEFAULT_EXE out/video.mp4 --overwrite --bundle-cache=false

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: default-exe-video
          path: out/video.mp4
          retention-days: 30
