name: Render Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Composition to render'
        required: true
        default: 'OHMS_LAW'
        type: choice
        options:
          - OHMS_LAW
          - DEFAULT_EXE

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg libnss3 libatk-bridge2.0-0 libcups2 libdbus-1-3 libdrm2 libgbm1 libasound2t64
          npm install --no-package-lock

      - name: Create output directory
        run: mkdir -p out

      - name: Render video
        run: |
          npx -y remotion@4.0.441 render src/index.tsx OHMS_LAW out/ohms-law.mp4 --overwrite

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: ohms-law-video-${{ github.run_number }}
          path: out/ohms-law.mp4
          retention-days: 30
