name: Render Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Composition to render'
        required: true
        default: 'OHMS_LAW'
        type: choice
        options:
          - OHMS_LAW
          - DEFAULT_EXE

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-chromium-${{ runner.os }}

      - name: Install system dependencies
        if: steps.apt-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            ffmpeg libnss3 libatk-bridge2.0-0 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libasound2t64

      - name: Install cached apt packages
        if: steps.apt-cache.outputs.cache-hit == 'true'
        run: |
          sudo dpkg -i /var/cache/apt/archives/*.deb 2>/dev/null || true

      - name: Install npm dependencies
        run: npm install --no-package-lock

      - name: Create output directory
        run: mkdir -p out

      - name: Render video
        run: |
          COMPOSITION="${{ inputs.composition }}"
          OUTPUT_FILE="out/$(echo "$COMPOSITION" | tr '[:upper:]' '[:lower:]' | tr '_' '-').mp4"
          npm exec -- @remotion/cli@4.0.441 render src/index.tsx "$COMPOSITION" "$OUTPUT_FILE" --overwrite --bundle-cache=false

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.composition }}-video-${{ github.run_number }}
          path: ${{ env.OUTPUT_FILE }}
          retention-days: 30
