name: Render Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Composition to render'
        required: true
        default: 'OHMS_LAW'
        type: choice
        options:
          - OHMS_LAW
          - DEFAULT_EXE

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg libnss3 libatk-bridge2.0-0 libcups2 libdbus-1-3 libdrm2 libgbm1 libasound2t64

      - name: Install npm dependencies
        run: npm install

- name: Render video
        run: |
          node node_modules/@remotion/cli/dist/index.js render src/index.tsx OHMS_LAW Outputs/video.mp4 --overwrite
          ls -la Outputs/

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohms-law-video
          path: Outputs/
          retention-days: 30
