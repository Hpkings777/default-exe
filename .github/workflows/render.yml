name: Render Video

on:
  workflow_dispatch:
    inputs:
      audio_file:
        description: 'URL or path to audio file (optional)'
        required: false
        default: ''
  push:
    branches:
      - master

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Download audio file
        if: github.event.inputs.audio_file != ''
        run: |
          mkdir -p public
          curl -L "${{ github.event.inputs.audio_file }}" -o public/default-exe.mp3

      - name: Render video
        run: npm run render
        env:
          REMOTION_APP_SERVER_URL: ${{ secrets.REMOTION_APP_SERVER_URL }}

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: default-exe-video
          path: Outputs/default-exe.mp4
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Outputs/default-exe.mp4
          asset_name: default-exe-${{ github.sha }}.mp4
          asset_content_type: video/mp4

      - name: Create Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.audio_file != ''
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: render-${{ github.run_number }}
          release_name: Render ${{ github.run_number }}
          draft: true
          prerelease: false

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🎬 Video rendered successfully! Artifacts: ${{ steps.upload.outputs.artifact-url }}'
            })
