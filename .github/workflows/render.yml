name: Render Video

on:
  workflow_dispatch:
    inputs:
      audio_file:
        description: 'URL to audio file (optional)'
        required: false
        default: ''
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx -y playwright install chromium --with-deps

      - name: Download audio file
        if: github.event.inputs.audio_file != ''
        run: |
          mkdir -p public
          curl -L "${{ github.event.inputs.audio_file }}" -o public/default-exe.mp3

      - name: Render video
        run: npm run render

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: default-exe-video-${{ github.run_number }}
          path: Outputs/default-exe.mp4
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: Outputs/default-exe.mp4
          name: Render ${{ github.run_number }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
